<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Zinat Group of Schools</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Added a small internal style to ensure the subject grid looks good -->
    <style>
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
        .subject-card {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            border: 2px solid transparent;
            transition: 0.3s;
            font-weight: bold;
            color: #333;
        }
        .subject-card:hover {
            border-color: #6a1b9a; /* Zinat Purple */
            background: #ede7f6;
        }
        .modal-content { width: 90%; max-width: 600px; }
    </style>
</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-header">
            <img src="zzz-removebg-preview.png" alt="Zinat Logo" class="login-logo">
            <h1>ZINAT <span>CBT PORTAL</span></h1>
        </div>

        <div class="login-tabs">
            <button class="tab-btn active" id="student-tab" onclick="switchLogin('student')">Student</button>
            <button class="tab-btn" id="admin-tab" onclick="switchLogin('admin')">Admin</button>
        </div>

        <form id="student-form" class="login-form">
            <div class="input-group">
                <label>Registration Number</label>
                <input type="text" id="student-reg" placeholder="e.g. ZINAT/2026/001" required>
            </div>
            <button type="button" class="btn-login" onclick="loginStudent()">Continue to Subjects</button>
        </form>

        <form id="admin-form" class="login-form" style="display: none;">
            <div class="input-group">
                <label>Admin Username</label>
                <input type="text" id="admin-user" placeholder="Username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="admin-pass" placeholder="••••••••">
            </div>
            <button type="button" class="btn-login admin-btn" onclick="loginAdmin()">Login to Dashboard</button>
        </form>

        <p class="login-footer">&copy; 2026 Zinat Group of Schools</p>
    </div>

    <!-- SUBJECT SELECTION MODAL -->
    <div id="subject-modal" class="modal-overlay" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
        <div class="modal-content" style="background:white; padding:30px; border-radius:12px; position:relative;">
            <h2>Select Your Subject</h2>
            <p>Click on the subject you are writing today:</p>
            
            <div id="subject-list-container" class="subject-grid">
                <!-- Subjects will be injected here by login.js -->
            </div>
            
            <button class="btn-close" onclick="closeSubjectModal()" style="margin-top:20px; width:100%; padding:10px; background:#ddd; border:none; border-radius:5px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
