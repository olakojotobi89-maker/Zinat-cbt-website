<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Zinat Group of Schools</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-header">
            <img src="zzz-removebg-preview.png" alt="Zinat Logo" class="login-logo">
            <h1>ZINAT <span>CBT PORTAL</span></h1>
        </div>

        <div class="login-tabs">
            <button class="tab-btn active" id="student-tab" onclick="switchLogin('student')">Student</button>
            <button class="tab-btn" id="admin-tab" onclick="switchLogin('admin')">Admin</button>
        </div>

        <form id="student-form" class="login-form">
            <div class="input-group">
                <label>Registration Number</label>
                <input type="text" id="student-reg" placeholder="e.g. ZINAT/2026/001" required>
            </div>
            <button type="button" class="btn-login" onclick="loginStudent()">Login to Exam</button>
        </form>

        <form id="admin-form" class="login-form" style="display: none;">
            <div class="input-group">
                <label>Admin Username</label>
                <input type="text" id="admin-user" placeholder="Username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="admin-pass" placeholder="••••••••">
            </div>
            <button type="button" class="btn-login admin-btn" onclick="loginAdmin()">Login to Dashboard</button>
        </form>

        <p class="login-footer">&copy; 2026 Zinat Group of Schools</p>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
